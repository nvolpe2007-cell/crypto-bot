# Crypto Scalping Bot Configuration

exchange:
  name: kraken
  sandbox: true

trading:
  mode: paper
  initial_capital: 500    # starting capital — bot reads real balance from Kraken at startup
  pairs:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  timeframe: 1m

strategy:
  fast_ema: 9
  slow_ema: 21
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30

risk:
  max_position_size: 25   # max USD per trade — conservative for first live run
  stop_loss_pct: 2.0
  take_profit_pct: 3.0
  max_daily_loss: 15      # bot stops for the day if total loss hits this
  max_open_positions: 3

futures:
  enabled: true           # set true to enable perp trading
  sandbox: false          # public funding/price data is mainnet
  pairs:
    - BTC/USD             # internally mapped to BTC/USD:USD on krakenfutures
    - ETH/USD
    - SOL/USD
  leverage: 3             # 3x default — capital efficient, modest liquidation risk
  max_position_size: 25   # max USD margin per perp trade
  # ── Activation ────────────────────────────────────────────────────────────
  # Paper perps (no money at risk):
  #   set TRADING_MODE=perps  in env, restart bot
  # Live perps on Kraken Futures (real money):
  #   1. set KRAKEN_FUTURES_API_KEY and KRAKEN_FUTURES_API_SECRET in .env
  #      (separate keys from spot — get them from futures.kraken.com → Settings → API)
  #   2. set TRADING_MODE=perps
  #   3. set PERPS_LIVE_ACK=yes (explicit confirmation gate)
  #   4. set trading.mode=live in this config

backtest:
  # Historical period to test
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  initial_balance: 100

logging:
  level: INFO
  file: logs/bot.log
  save_trades: true

# ── Alt-perp confluence strategy (src/altperp/) ───────────────────────────────
# Bybit signals → Kraken Futures execution. PAPER-only by design — directional
# edge is unproven per research (memory: altperp-strategy); deploying live here
# is forward-walk data collection alongside the funding arb, not a live punt.
# The package's orders.py raises if anyone tries to flip it to live without a
# Kraken execution client wired up. Leave it that way until edge is measured.
altperp:
  enabled: true
  # Claude-API gate-keeper layer that confirms / vetoes / sizes structural setups.
  # OFF by default: without ANTHROPIC_API_KEY in .env the brain fail-closes and
  # vetoes every trade, which defeats the point of collecting forward data.
  # To enable: add ANTHROPIC_API_KEY to /opt/crypto-bot/.env, flip this to true,
  # restart the service.
  ai_brain_enabled: false
