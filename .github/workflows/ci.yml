name: Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Install from requirements.txt (not a hand-picked subset — that drift is
        # why CI silently died on a missing `requests`). pandas-ta classic was
        # pulled from PyPI and is unfindable on 3.11+; the test suite STUBS it
        # (tests/conftest.py), so it's excluded here — prod gets it via the git
        # fallback in deploy/vps_update.sh. pytest-asyncio is in requirements.txt,
        # so the async suite (asyncio_mode=auto) runs here too.
        run: |
          python -m pip install --upgrade pip
          grep -v '^pandas-ta' requirements.txt | pip install -r /dev/stdin

      - name: Run tests
        run: pytest tests/ -q --tb=short
