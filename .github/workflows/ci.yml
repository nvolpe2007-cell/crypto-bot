name: Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Install the FULL pinned dependency set, not a hand-picked subset — the
        # old subset drifted from requirements.txt (missing ccxt/aiohttp/anthropic/
        # pandas-ta…), so CI silently tested a different environment than prod and
        # could pass while imports broke for real. pytest-asyncio is in
        # requirements.txt, so the async suite (asyncio_mode=auto) runs here too.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short
